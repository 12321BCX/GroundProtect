name: Build GroundProtect JAR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build with Maven
      run: mvn clean package
    
    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v4
      with:
        name: GroundProtect-1.0.0
        path: target/GroundProtect-1.0.0.jar
        retention-days: 30
